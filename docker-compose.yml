services:
  db:
    image: mysql:8.0
    container_name: vrsds_db_container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Wnq57177
      MYSQL_DATABASE: vrsds_enterprise
    ports:
      - "3307:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/init.sql

  vrsds_portal:
    build: .
    container_name: vrsds_main_portal
    ports:
      - "8501:8501"
    environment:
      - DB_HOST=db
    depends_on:
      - db
    command: streamlit run main.py --server.port=8501 --server.address=0.0.0.0